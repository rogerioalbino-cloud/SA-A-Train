<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Train Login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>a

    <div class="tela">

        <img src="unnamed.webp" class="logo" alt="Logo A-Train">

        <h1 class="titulo">A-TRAIN</h1>

        <p class="subtitulo">
            Monitoramento inteligente da<br>
            sua frota ferroviária
        </p>

        <form>

            <label>Usuário</label>
            <input type="text" value="operador01">

            <label>Senha</label>
            <input type="password" value="12345678">

            <div class="opcoes">

                <div class="lembrar">
                    <input type="checkbox" checked>
                    <span>Lembrar-me</span>
                </div>

                <a href="#" class="esqueceu">Esqueci minha senha</a>

            </div>

            <div class="btn-area">
                <button type="submit">Entrar</button>
            </div>

            <p class="cadastro">
                Não tem conta?
                <a href="#">Cadastre-se</a>
            </p>

        </form>

    </div>

</body>
</html>
