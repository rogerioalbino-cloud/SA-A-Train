<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trens</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">

        <div class="logo">
            🚆 <span>Trens</span>
        </div>

        <nav>
            <a class="ativo">🏠 Início</a>
            <a>🚆 Trens</a>
            <a>📡 Sensores</a>
            <a>📄 Relatórios</a>
            <a>☰ Mais</a>
        </nav>

    </aside>

    <main>

        <header>
            <h1>Trens</h1>
            <div class="notificacao">🔔</div>
        </header>

        <div class="busca">

            <input type="text" placeholder="Buscar trem...">

            <button>⚲</button>

        </div>

        <div class="abas">
            <span class="selecionado">Todos</span>
            <span>Joinville</span>
            <span>Massaranduba</span>
            <span>Paranaguá</span>
        </div>

        <div class="lista">

            <div class="card">
                <div class="icone">🚆</div>

                <div class="info">
                    <h2>TR-204</h2>
                    <p>Joinville - SC</p>
                </div>

                <div class="status ativo">Ativo</div>

                <div class="velocidade verde">
                    78 Km/h
                </div>
            </div>

            <div class="card">
                <div class="icone">🚆</div>

                <div class="info">
                    <h2>TR-188</h2>
                    <p>Blumenau - SC</p>
                </div>

                <div class="status manutencao">
                    Em manutenção
                </div>

                <div class="velocidade laranja">
                    0 Km/h
                </div>
            </div>

            <div class="card">
                <div class="icone">🚆</div>

                <div class="info">
                    <h2>TR-175</h2>
                    <p>São Paulo - SP</p>
                </div>

                <div class="status parado">
                    Parado
                </div>

                <div class="velocidade vermelho">
                    0 Km/h
                </div>
            </div>

            <div class="card">
                <div class="icone">🚆</div>

                <div class="info">
                    <h2>TR-198</h2>
                    <p>Rio de Janeiro - RJ</p>
                </div>

                <div class="status ativo">
                    Ativo
                </div>

                <div class="velocidade verde">
                    82 Km/h
                </div>
            </div>

        </div>

    </main>

</div>

</body>
</html>
